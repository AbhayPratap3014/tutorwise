<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your results — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="container py-4" style="max-width:900px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <span class="brand-logo text-gradient">TutorWise</span>
    <a href="dashboard.html" class="btn btn-outline-brand btn-sm">Back to dashboard</a>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="solid-card p-4 text-center h-100">
        <p class="text-muted-soft mb-1">Score</p>
        <h1 class="text-gradient mb-0" id="scoreText">--</h1>
        <p class="text-muted-soft" id="percentText"></p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="solid-card p-4 h-100">
        <p class="text-muted-soft mb-2">Breakdown</p>
        <canvas id="pieChart" height="150"></canvas>
      </div>
    </div>
    <div class="col-md-4">
      <div class="solid-card p-4 h-100 d-flex flex-column justify-content-center">
        <div class="d-flex justify-content-between py-1"><span>Correct</span><strong id="correctStat" style="color:var(--success)"></strong></div>
        <div class="d-flex justify-content-between py-1"><span>Wrong</span><strong id="wrongStat" style="color:var(--danger)"></strong></div>
        <div class="d-flex justify-content-between py-1"><span>Skipped</span><strong id="skippedStat" style="color:var(--warning)"></strong></div>
        <div class="d-flex justify-content-between py-1"><span>Time taken</span><strong id="timeStat"></strong></div>
      </div>
    </div>
  </div>

  <div class="solid-card p-4 mb-4">
    <p class="text-muted-soft mb-2">Topic-wise performance</p>
    <canvas id="barChart" height="120"></canvas>
  </div>

  <div class="solid-card p-4 mb-4" id="analysisCard">
    <h5 class="mb-3"><i class="fa-solid fa-brain text-gradient me-2"></i>AI feedback</h5>
    <div id="analysisContent"><p class="text-muted-soft">No analysis available for this test.</p></div>
  </div>

  <div class="solid-card p-4 mb-4">
    <h5 class="mb-3">Question review</h5>
    <div id="reviewList"></div>
  </div>

  <div class="text-center">
    <a href="quiz-setup.html" class="btn btn-brand"><i class="fa-solid fa-rotate-right me-1"></i>Take another test</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/result.js"></script>
</body>
</html>
