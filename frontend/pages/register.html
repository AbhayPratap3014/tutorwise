<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="hero-blob" style="top:-150px; right:-150px;"></div>
<div class="container position-relative" style="z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 0;">
  <div class="glass-card p-4 p-md-5" style="max-width:480px; width:100%;">
    <a href="../index.html" class="brand-logo text-gradient d-block mb-4">TutorWise</a>
    <h3 class="mb-1">Create your account</h3>
    <p class="text-muted-soft mb-4">Start your first AI-generated test in minutes.</p>

    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Class</label>
        <select id="classNum" class="form-select" required>
          <option value="" selected disabled>Select your class</option>
          <script>for (let i = 1; i <= 10; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" minlength="6" required>
        <div class="form-text">At least 6 characters.</div>
      </div>
      <button type="submit" id="registerBtn" class="btn btn-brand w-100">Create account</button>
    </form>

    <p class="text-center text-muted-soft mt-4 mb-0">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script>
  const form = document.getElementById("registerForm");
  const alertBox = document.getElementById("alertBox");
  const registerBtn = document.getElementById("registerBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.classList.add("d-none");
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
    try {
      await TutorwiseAuth.register(
        document.getElementById("email").value,
        document.getElementById("password").value,
        document.getElementById("name").value,
        Number(document.getElementById("classNum").value)
      );
      window.location.href = "dashboard.html";
    } catch (err) {
      alertBox.textContent = err.message || "Registration failed. Please try again.";
      alertBox.classList.remove("d-none");
      registerBtn.disabled = false;
      registerBtn.textContent = "Create account";
    }
  });
</script>
</body>
</html>
