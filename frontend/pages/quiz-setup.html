<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024, initial-scale=1.0" />
<title>Start a test — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="d-flex">
  <aside class="app-sidebar p-3 d-none d-lg-flex flex-column" style="width:250px; flex-shrink:0;">
    <a href="../index.html" class="brand-logo text-gradient mb-4 px-2">TutorWise</a>
    <nav class="nav flex-column flex-grow-1">
      <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-gauge-high me-2"></i>Dashboard</a>
      <a class="nav-link active" href="quiz-setup.html"><i class="fa-solid fa-pen-to-square me-2"></i>Start Test</a>
      <a class="nav-link" href="profile.html"><i class="fa-solid fa-user me-2"></i>Profile</a>
    </nav>
    <button class="nav-link border-0 bg-transparent text-start" onclick="TutorwiseAuth.logout()">
      <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Log out
    </button>
  </aside>

  <main class="flex-grow-1 p-3 p-md-4 d-flex align-items-center justify-content-center">
    <div class="solid-card p-4 p-md-5" style="max-width:560px; width:100%;">
      <h3 class="mb-1">Set up your test</h3>
      <p class="text-muted-soft mb-4">Claude will generate fresh NCERT-style questions for these settings.</p>

      <div id="alertBox" class="alert alert-danger d-none"></div>

      <form id="setupForm">
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label">Class</label>
            <select id="classNum" class="form-select" required>
              <script>for (let i = 1; i <= 10; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Subject</label>
            <select id="subject" class="form-select" required>
              <option value="Math">Math</option>
              <option value="Science">Science</option>
              <option value="English">English</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label">Chapter <span class="text-muted-soft">(optional)</span></label>
            <input type="text" id="chapter" class="form-control" placeholder="e.g. Light — Reflection and Refraction">
          </div>
          <div class="col-6">
            <label class="form-label">Difficulty</label>
            <select id="difficulty" class="form-select" required>
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label">Number of questions</label>
            <select id="numQuestions" class="form-select" required>
              <option value="5">5</option>
              <option value="10" selected>10</option>
              <option value="15">15</option>
              <option value="20">20</option>
            </select>
          </div>
        </div>
        <button type="submit" id="generateBtn" class="btn btn-brand w-100 mt-4">
          <i class="fa-solid fa-wand-magic-sparkles me-2"></i>Generate Test
        </button>
      </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/theme.js"></script>
<script>
(async function () {
  const session = await TutorwiseAuth.requireSession();
  if (!session) return;

  document.getElementById("setupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("generateBtn");
    const alertBox = document.getElementById("alertBox");
    alertBox.classList.add("d-none");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Generating questions...';

    const payload = {
      classNum: Number(document.getElementById("classNum").value),
      subject: document.getElementById("subject").value,
      chapter: document.getElementById("chapter").value.trim() || null,
      difficulty: document.getElementById("difficulty").value,
      numQuestions: Number(document.getElementById("numQuestions").value),
    };

    try {
      const { questions, meta } = await TutorwiseAPI.generateTest(payload);
      sessionStorage.setItem("tutorwise_active_quiz", JSON.stringify({ questions, meta, startedAt: Date.now() }));
      window.location.href = "quiz.html";
    } catch (err) {
      alertBox.textContent = err.message || "Couldn't generate the test. Try again.";
      alertBox.classList.remove("d-none");
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles me-2"></i>Generate Test';
    }
  });
})();
</script>
</body>
</html>
