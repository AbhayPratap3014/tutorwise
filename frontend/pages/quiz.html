<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test in progress — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="container py-4" style="max-width:760px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <span class="brand-logo text-gradient">TutorWise</span>
    <div class="d-flex align-items-center gap-3">
      <span class="badge bg-gradient-brand fs-6" id="timerBadge"><i class="fa-regular fa-clock me-1"></i>--:--</span>
      <span class="text-muted-soft" id="counterLabel">Q 1 / 10</span>
    </div>
  </div>

  <div class="progress-thin mb-4"><div class="progress-thin-bar" id="progressBar" style="width:0%"></div></div>

  <div class="solid-card p-4 p-md-5" id="quizCard">
    <div class="skeleton" style="height:200px;"></div>
  </div>

  <div class="d-flex justify-content-between mt-4">
    <button class="btn btn-outline-brand" id="prevBtn"><i class="fa-solid fa-arrow-left me-1"></i>Previous</button>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-brand d-none" id="submitBtn">Submit test</button>
      <button class="btn btn-brand" id="nextBtn">Next<i class="fa-solid fa-arrow-right ms-1"></i></button>
    </div>
  </div>
</div>

<!-- Submit confirmation modal -->
<div class="modal fade" id="submitModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content solid-card border-0">
      <div class="modal-body p-4 text-center">
        <i class="fa-solid fa-circle-check fs-1 text-gradient mb-3"></i>
        <h5>Submit your test?</h5>
        <p class="text-muted-soft" id="submitSummary"></p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button class="btn btn-outline-brand" data-bs-dismiss="modal">Keep reviewing</button>
          <button class="btn btn-brand" id="confirmSubmitBtn">Submit</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/quiz.js"></script>
</body>
</html>
