<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024, initial-scale=1.0" />
<title>Log in — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="page-shell">

<!-- ================= LOADING SCREEN ================= -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-content">
    <img src="../assets/img/jod.png.jpeg" alt="Loading mascot" class="loading-mascot">
    <p class="loading-text">Loading TutorWise</p>
  </div>
</div>

<div class="hero-blob" style="top:-150px; left:-150px;"></div>
<div class="container position-relative" style="z-index:1; min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div class="glass-card p-4 p-md-5" style="max-width:440px; width:100%;">
    <a href="../index.html" class="brand-logo text-gradient d-block mb-4">TutorWise</a>
    <h3 class="mb-1">Welcome back</h3>
    <p class="text-muted-soft mb-4">Log in to continue your learning.</p>

    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <div class="social-login mb-4">
      <button class="btn btn-social btn-google w-100" id="googleBtn" type="button">
        <i class="fa-brands fa-google me-2"></i> Continue with Google
      </button>
      <div class="text-center text-muted-soft small mt-3">Or sign in with your email and password</div>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <div class="text-end mb-3">
        <a href="forgot-password.html" class="small">Forgot password?</a>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-brand w-100">Log in</button>
    </form>

    <p class="text-center text-muted-soft mt-4 mb-0">
      Don't have an account? <a href="register.html">Create one</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script>
  // Hide loading screen immediately
  const loadingScreen = document.getElementById('loadingScreen');
  if (loadingScreen) {
    loadingScreen.style.display = 'none';
  }

  const form = document.getElementById("loginForm");
  const alertBox = document.getElementById("alertBox");
  const loginBtn = document.getElementById("loginBtn");
  const googleBtn = document.getElementById("googleBtn");

  googleBtn.addEventListener("click", async () => {
    alertBox.classList.add("d-none");
    try {
      await TutorwiseAuth.loginWithProvider("google");
    } catch (err) {
      alertBox.textContent = err.message || "Google sign-in failed.";
      alertBox.classList.remove("d-none");
    }
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    alertBox.classList.add("d-none");
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
    try {
      await TutorwiseAuth.login(document.getElementById("email").value, document.getElementById("password").value);
      window.location.href = "dashboard.html";
    } catch (err) {
      alertBox.textContent = err.message || "Login failed. Check your credentials.";
      alertBox.classList.remove("d-none");
      loginBtn.disabled = false;
      loginBtn.textContent = "Log in";
    }
  });
</script>
</div>
</body>
</html>
