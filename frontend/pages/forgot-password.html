<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="container" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div class="glass-card p-4 p-md-5" style="max-width:440px; width:100%;">
    <a href="../index.html" class="brand-logo text-gradient d-block mb-4">TutorWise</a>
    <h3 class="mb-1">Reset your password</h3>
    <p class="text-muted-soft mb-4">We'll email you a reset link.</p>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="resetForm">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <button type="submit" id="resetBtn" class="btn btn-brand w-100">Send reset link</button>
    </form>
    <p class="text-center text-muted-soft mt-4 mb-0"><a href="login.html">Back to login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("resetBtn");
    const alertBox = document.getElementById("alertBox");
    btn.disabled = true;
    btn.textContent = "Sending...";
    try {
      await TutorwiseAuth.sendPasswordReset(document.getElementById("email").value);
      alertBox.className = "alert alert-success";
      alertBox.textContent = "Check your email for a reset link.";
    } catch (err) {
      alertBox.className = "alert alert-danger";
      alertBox.textContent = err.message || "Something went wrong.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Send reset link";
    }
  });
</script>
</body>
</html>
