<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile — TutorWise</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="../css/style.css?v=20260722">
</head>
<body>
<div class="d-flex">
  <aside class="app-sidebar p-3 d-none d-lg-flex flex-column" style="width:250px; flex-shrink:0;">
    <a href="../index.html" class="brand-logo text-gradient mb-4 px-2">TutorWise</a>
    <nav class="nav flex-column flex-grow-1">
      <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-gauge-high me-2"></i>Dashboard</a>
      <a class="nav-link" href="quiz-setup.html"><i class="fa-solid fa-pen-to-square me-2"></i>Start Test</a>
      <a class="nav-link active" href="profile.html"><i class="fa-solid fa-user me-2"></i>Profile</a>
    </nav>
    <button class="nav-link border-0 bg-transparent text-start" onclick="TutorwiseAuth.logout()">
      <i class="fa-solid fa-arrow-right-from-bracket me-2"></i>Log out
    </button>
  </aside>

  <main class="flex-grow-1 p-3 p-md-4">
    <h3 class="mb-4">Your profile</h3>

    <div class="row g-4">
      <div class="col-lg-4">
        <div class="solid-card p-4 text-center">
          <div class="rounded-circle bg-gradient-brand mx-auto mb-3 d-flex align-items-center justify-content-center text-white fs-2 fw-bold" style="width:90px; height:90px;" id="avatarInitial">?</div>
          <h5 id="profileName">—</h5>
          <p class="text-muted-soft mb-1" id="profileEmail">—</p>
          <span class="badge bg-gradient-brand" id="profileClass">—</span>

          <hr style="border-color:var(--border);">
          <form id="editForm" class="text-start">
            <label class="form-label small">Name</label>
            <input type="text" id="editName" class="form-control form-control-sm mb-2">
            <label class="form-label small">Class</label>
            <select id="editClass" class="form-select form-select-sm mb-3">
              <script>for (let i = 1; i <= 10; i++) document.write(`<option value="${i}">Class ${i}</option>`);</script>
            </select>
            <button class="btn btn-brand btn-sm w-100">Save changes</button>
          </form>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="row g-3 mb-3">
          <div class="col-4"><div class="solid-card stat-card text-center"><div class="stat-value" id="statTests">-</div><div class="stat-label">Tests</div></div></div>
          <div class="col-4"><div class="solid-card stat-card text-center"><div class="stat-value" id="statAvg">-</div><div class="stat-label">Avg score</div></div></div>
          <div class="col-4"><div class="solid-card stat-card text-center"><div class="stat-value" id="statStreak">-</div><div class="stat-label">Best subject</div></div></div>
        </div>

        <div class="solid-card p-4">
          <h6 class="mb-3">Test history</h6>
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead><tr><th>Subject</th><th>Class</th><th>Difficulty</th><th>Score</th><th>Date</th></tr></thead>
              <tbody id="historyBody"><tr><td colspan="5"><div class="skeleton" style="height:20px;"></div></td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabaseClient.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/api.js"></script>
<script src="../js/theme.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
